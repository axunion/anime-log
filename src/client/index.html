<!DOCTYPE html>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, minimum-scale=1, maximum-scale=1">
<meta name="format-detection" content="telephone=no">
<title>anime</title>
<link rel="stylesheet" href="./styles/anime.css">

<div id="viewport">

  <div id="frame-title" class="frame">
    <nav class="nav">
      <ul class="nav-list">
        <li><a href="#history">History</a></li>
        <li><a href="#year">Year</a></li>
        <li><a href="#name">Title</a></li>
      </ul>
    </nav>

    <div id="history" class="block">
      <label class="filter">
        <input type="text" maxlength="64">
      </label>
      <ul class="title-list"></ul>
    </div>

    <div id="year" class="block">
      <label class="filter">
        <input type="text" maxlength="64">
      </label>
      <ul class="title-list"></ul>
    </div>

    <div id="name" class="block">
      <label class="filter">
        <input type="text" maxlength="64">
      </label>
      <ul class="title-list">
        <template id="title-list-item-template">
          <li title="">
            <span class="name"></span>
            <span class="year"></span>
          </li>
        </template>
      </ul>
    </div>
  </div>

  <!-- =============================== -->

  <div id="frame-cast" class="frame">
    <div class="block">
      <div class="h">
        <button class="close" type="button">×</button>
        <a href="#" target="_blank" rel="noreferrer" class="goog" aria-label="Google"></a>
        <a href="#" target="_blank" rel="noreferrer" class="wkpd" aria-label="Wikipedia">
          <span class="icon-wikipedia"></span>
        </a>
      </div>

      <table class="cast-table">
        <template id="cast-table-record-template">
          <tr>
            <th><span class="name" title=""></span></th>
            <td><span class="part"></span></td>
          </tr>
        </template>
      </table>
    </div>
  </div>

  <!-- =============================== -->

  <div id="frame-voice" class="frame">
    <div class="block">
      <div class="h">
        <button class="close" type="button">×</button>
        <a href="#" target="_blank" rel="noreferrer" class="goog" aria-label="Google"></a>
        <a href="#" target="_blank" rel="noreferrer" class="wkpd" aria-label="Wikipedia">
          <span class="icon-wikipedia"></span>
        </a>
      </div>

      <dl class="voice-list">
        <template id="voice-list-item-template">
          <dt><span class="title"></span></dt>
          <dd><span class="part"></span></dd>
        </template>
      </dl>
    </div>
  </div>

</div>

<script type="module" src="./viewer/main.ts"></script>
